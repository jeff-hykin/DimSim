name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Derive version from tag (v0.1.15 -> 0.1.15)
      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # Generate registry.json with GitHub Release download URLs
      - name: Generate registry.json
        run: |
          REPO="${{ github.repository }}"
          TAG="${GITHUB_REF_NAME}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          jq --arg v "$VERSION" \
             --arg base "$BASE" \
             '{
               version: $v,
               coreUrl: "\($base)/dimsim-core-v\($v).tar.gz",
               scenes: (.scenes | to_entries | map({
                 key: .key,
                 value: (.value + { url: "\($base)/scene-\(.key)-v\($v).tar.gz" })
               }) | from_entries)
             }' scenes.template.json > registry.json
          echo "Generated registry.json:"
          cat registry.json

      # Build frontend
      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      # Package release artifacts (core + scenes)
      - name: Package release
        run: bash scripts/package-release.sh "$VERSION"

      # Compile CLI binary for each platform
      - name: Compile binaries
        run: |
          cd dimos-cli
          COMPILE="deno compile --allow-all --unstable-net --include deno.json"
          $COMPILE --target x86_64-unknown-linux-gnu -o ../dimsim-linux-x64 cli.ts
          $COMPILE --target aarch64-apple-darwin -o ../dimsim-darwin-arm64 cli.ts
          $COMPILE --target x86_64-apple-darwin -o ../dimsim-darwin-x64 cli.ts
          cd ..
          ls -lh dimsim-linux-x64 dimsim-darwin-arm64 dimsim-darwin-x64

      # Create GitHub Release with all artifacts
      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            registry.json \
            "dimsim-core-v${VERSION}.tar.gz" \
            "scene-apt-v${VERSION}.tar.gz" \
            dimsim-linux-x64 \
            dimsim-darwin-arm64 \
            dimsim-darwin-x64 \
            --title "DimSim ${GITHUB_REF_NAME}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
